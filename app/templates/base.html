<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}个人题库与试卷管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
    <!-- MathJax - LaTeX公式渲染 -->
    <script>
      MathJax = {
        tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
        svg: { fontCache: 'global' }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>
    <!-- Mermaid - 流程图 -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({startOnLoad:false, theme:'neutral'});</script>
</head>
<body>
<div class="app-layout">
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <i class="bi bi-mortarboard-fill"></i>
            <div>
                <div class="logo-title">题库试卷系统</div>
                <div class="logo-sub">浙江省信息技术 V3.0</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="{% if active=='dashboard' %}active{% endif %}">
                <i class="bi bi-speedometer2"></i> 工作台
            </a>
            <a href="/questions" class="{% if active=='questions' %}active{% endif %}">
                <i class="bi bi-collection"></i> 个人题库
            </a>
            <a href="/questions/new" class="{% if active=='questions' %}active{% endif %}">
                <i class="bi bi-plus-circle"></i> 录入试题
            </a>
            <a href="/questions/import" class="{% if active=='questions' %}active{% endif %}">
                <i class="bi bi-upload"></i> 批量导入
            </a>
            <a href="/questions/recycle" class="{% if active=='questions' %}active{% endif %}">
                <i class="bi bi-trash3"></i> 回收站
            </a>
            <a href="/papers" class="{% if active=='papers' %}active{% endif %}">
                <i class="bi bi-file-earmark-text"></i> 试卷管理
            </a>
            <a href="/tags" class="{% if active=='tags' %}active{% endif %}">
                <i class="bi bi-diagram-3"></i> 知识点/标签
            </a>
            <a href="/backup" class="{% if active=='backup' %}active{% endif %}">
                <i class="bi bi-database"></i> 备份与说明
            </a>
        </nav>
        <div class="sidebar-foot">
            <small>单人教师本地版 · SQLite</small>
        </div>
    </aside>
    <!-- 主区域 -->
    <main class="main-area">
        {% block content %}{% endblock %}
    </main>
</div>

<!-- 全局Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="globalToast" class="toast" role="alert">
    <div class="toast-header">
      <strong class="me-auto" id="toastTitle">提示</strong>
      <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
    </div>
    <div class="toast-body" id="toastBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
