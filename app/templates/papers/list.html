{% extends 'base.html' %}
{% block title %}试卷管理{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">试卷管理</h1>
        <div class="page-sub">学考/选考模板智能组卷，版本控制，Word导出与答题卡生成</div>
    </div>
    <a href="/papers/new" class="btn btn-primary"><i class="bi bi-plus-lg"></i> 新建试卷</a>
</div>

<div class="card">
    <div class="card-body">
        <div id="paperList"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadPapers() {
    const d = await api('/api/papers');
    const el = document.getElementById('paperList');
    if (d.length === 0) {
        el.innerHTML = '<div class="text-center text-muted py-4">暂无试卷，<a href="/papers/new">立即创建</a></div>';
        return;
    }
    el.innerHTML = d.map(p=>`
        <div class="paper-q-item">
            <div class="q-num"><i class="bi bi-file-earmark-text fs-4 text-primary"></i></div>
            <div class="q-stem">
                <div class="d-flex align-items-center gap-2 mb-1">
                    <strong>${esc(p.title)}</strong>
                    <span class="badge ${p.mode==='xuekao'?'bg-info':'bg-success'}">${p.mode==='xuekao'?'学考':'选考'}</span>
                    <span class="text-muted small">${p.total_score}分 · ${p.question_count}题</span>
                </div>
                <div class="text-muted small">创建于 ${p.created_at}</div>
            </div>
            <div class="q-actions" style="flex-direction:row">
                <a href="/papers/${p.id}/edit" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                <a href="/papers/${p.id}/preview" class="btn btn-sm btn-outline-info"><i class="bi bi-eye"></i></a>
                <button class="btn btn-sm btn-outline-success" onclick="exportDocx(${p.id})"><i class="bi bi-download"></i></button>
                <button class="btn btn-sm btn-outline-secondary" onclick="exportAnswer(${p.id})"><i class="bi bi-card-text"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="delPaper(${p.id})"><i class="bi bi-trash"></i></button>
            </div>
        </div>
    `).join('');
}

function exportDocx(pid) {
    window.open(`/api/papers/${pid}/export_docx`);
}
function exportAnswer(pid) {
    window.open(`/api/papers/${pid}/export_docx?answer=1`);
}
function exportSheet(pid, pages='single') {
    window.open(`/api/papers/${pid}/answer_sheet?pages=${pages}`);
}

async function delPaper(pid) {
    if (!confirm('确认删除该试卷？')) return;
    await api(`/api/papers/${pid}`, {method:'DELETE'});
    toast('已删除','success');
    loadPapers();
}

loadPapers();
</script>
{% endblock %}
