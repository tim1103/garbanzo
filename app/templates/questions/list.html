{% extends 'base.html' %}
{% block title %}个人题库 - 题库管理{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">个人题库</h1>
        <div class="page-sub">全文检索、批量打标签、按题型/教材/难度筛选</div>
    </div>
    <div>
        <a href="/questions/new" class="btn btn-primary"><i class="bi bi-plus-lg"></i> 录入新试题</a>
        <a href="/questions/import" class="btn btn-outline-secondary"><i class="bi bi-upload"></i> 批量导入</a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <!-- 搜索栏 -->
        <div class="toolbar">
            <input type="text" id="searchKw" class="form-control" placeholder="搜索题干、解析、代码片段（如 df.groupby()）" style="flex:1;min-width:300px">
            <select id="filterType" class="form-select">
                <option value="">全部题型</option>
                {% for k,v in question_types.items() %}
                <option value="{{k}}">{{v}}</option>
                {% endfor %}
            </select>
            <select id="filterKp" class="form-select">
                <option value="">全部知识点</option>
            </select>
            <select id="filterTag" class="form-select">
                <option value="">全部标签</option>
            </select>
            <select id="filterDiff" class="form-select">
                <option value="">全部难度</option>
                <option value="1">★☆☆☆☆</option>
                <option value="2">★★☆☆☆</option>
                <option value="3">★★★☆☆</option>
                <option value="4">★★★★☆</option>
                <option value="5">★★★★★</option>
            </select>
            <button class="btn btn-primary" onclick="loadList(1)"><i class="bi bi-search"></i> 搜索</button>
            <button class="btn btn-outline-secondary" onclick="clearFilters()">重置</button>
        </div>

        <!-- 批量操作栏 -->
        <div class="d-flex align-items-center justify-content-between mb-2">
            <div>
                <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)"> 
                <label for="selectAll" class="form-check-label">全选</label>
                <span class="text-muted ms-3">已选 <strong id="selCount">0</strong> 题</span>
                <button class="btn btn-sm btn-outline-primary ms-3" onclick="openBatchTagModal()" id="batchTagBtn" disabled>
                    <i class="bi bi-tags"></i> 批量打标签
                </button>
            </div>
            <div class="text-muted" id="totalInfo">共 0 题</div>
        </div>

        <!-- 列表 -->
        <div id="qList"></div>
        <!-- 分页 -->
        <nav class="mt-3"><ul class="pagination justify-content-center" id="pagination"></ul></nav>
    </div>
</div>

<!-- 批量打标签弹窗 -->
<div class="modal fade" id="batchTagModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">批量打标签</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted">已选 <strong id="modalSelCount">0</strong> 道题</p>
        <div class="mb-3">
            <label class="form-label">已有标签（多选）</label>
            <div id="tagCheckboxes" style="max-height:200px;overflow-y:auto;border:1px solid #ddd;padding:8px;border-radius:4px"></div>
        </div>
        <div>
            <label class="form-label">新建标签（多个用逗号分隔）</label>
            <input type="text" class="form-control" id="newTagsInput" placeholder="如：动态规划,备忘录">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary" onclick="submitBatchTags()" data-shortcut="save">应用</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1, totalPages = 1;
let allTags = [];
let selectedIds = new Set();

async function loadKpOptions() {
    const tree = await api('/api/kp/tree');
    const flat = [];
    function walk(nodes, depth=0) {
        for (const n of nodes) {
            flat.push({id:n.id, name:'—'.repeat(depth)+n.name, book:n.book});
            if (n.children) walk(n.children, depth+1);
        }
    }
    walk(tree);
    const sel = document.getElementById('filterKp');
    flat.forEach(k=>{
        const opt = document.createElement('option');
        opt.value = k.id;
        opt.textContent = (k.book?('['+k.book+'] '):'') + k.name;
        sel.appendChild(opt);
    });
}

async function loadTags() {
    allTags = await api('/api/tags');
    const sel = document.getElementById('filterTag');
    allTags.forEach(t=>{
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.name;
        sel.appendChild(opt);
    });
}

async function loadList(page=1) {
    currentPage = page;
    const kw = document.getElementById('searchKw').value;
    const type = document.getElementById('filterType').value;
    const kp = document.getElementById('filterKp').value;
    const tag = document.getElementById('filterTag').value;
    const diff = document.getElementById('filterDiff').value;
    const d = await api(`/api/questions?page=${page}&size=15&kw=${encodeURIComponent(kw)}&type=${type}&kp_id=${kp}&tag_id=${tag}&difficulty=${diff}`);
    const list = d.list;
    totalPages = Math.ceil(d.total / d.size) || 1;
    document.getElementById('totalInfo').textContent = `共 ${d.total} 题`;
    const el = document.getElementById('qList');
    if (list.length === 0) {
        el.innerHTML = '<div class="text-center text-muted py-4">暂无试题，<a href="/questions/new">去录入</a></div>';
    } else {
        el.innerHTML = list.map(q=>`
            <div class="paper-q-item">
                <input type="checkbox" class="form-check-input q-check" value="${q.id}" ${selectedIds.has(q.id)?'checked':''} onchange="onSelectChange(this)">
                <div class="q-num">${q.id}</div>
                <div class="q-stem">
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <span class="badge bg-primary">${Q_TYPE[q.type]||q.type}</span>
                        ${q.kp_name?`<span class="badge bg-info text-white">${q.kp_name}</span>`:''}
                        <span class="diff-stars" title="难度">${diffStars(q.difficulty)}</span>
                        <span class="text-muted small">${q.score}分</span>
                        ${(q.tags||[]).map(t=>`<span class="tag-pill colored" style="background:${t.color}">${t.name}</span>`).join('')}
                    </div>
                    <div class="stem-preview">${highlightSearch(kw, q.summary||q.stem)}</div>
                </div>
                <div class="q-actions">
                    <a href="/questions/${q.id}/edit" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                    <button class="btn btn-sm btn-outline-danger" onclick="delQ(${q.id})"><i class="bi bi-trash"></i></button>
                </div>
            </div>
        `).join('');
        // 重新渲染stem_preview中的MathJax
        el.querySelectorAll('.stem-preview').forEach(c=>{
            if (window.MathJax) MathJax.typesetPromise([c]).catch(()=>{});
        });
    }
    renderPagination();
    updateSelCount();
}

function highlightSearch(kw, text) {
    if (!kw) return esc(text).slice(0,200);
    const escaped = esc(text);
    const re = new RegExp('('+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    return escaped.replace(re, '<mark class="search-hit">$1</mark>').slice(0,300);
}

function renderPagination() {
    const el = document.getElementById('pagination');
    let html = '';
    for (let i=1; i<=totalPages; i++) {
        html += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" href="javascript:loadList(${i})">${i}</a></li>`;
    }
    el.innerHTML = html;
}

function clearFilters() {
    ['searchKw','filterType','filterKp','filterTag','filterDiff'].forEach(id=>document.getElementById(id).value='');
    loadList(1);
}

function toggleSelectAll(checked) {
    document.querySelectorAll('.q-check').forEach(cb=>{
        cb.checked = checked;
        if (checked) selectedIds.add(parseInt(cb.value));
        else selectedIds.delete(parseInt(cb.value));
    });
    updateSelCount();
}

function onSelectChange(cb) {
    const id = parseInt(cb.value);
    if (cb.checked) selectedIds.add(id);
    else selectedIds.delete(id);
    updateSelCount();
}

function updateSelCount() {
    const n = selectedIds.size;
    document.getElementById('selCount').textContent = n;
    document.getElementById('batchTagBtn').disabled = n===0;
}

function openBatchTagModal() {
    document.getElementById('modalSelCount').textContent = selectedIds.size;
    const tagBox = document.getElementById('tagCheckboxes');
    tagBox.innerHTML = allTags.map(t=>`
        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="${t.id}" id="tag_${t.id}">
            <label class="form-check-label" for="tag_${t.id}">
                <span class="tag-pill colored" style="background:${t.color}">${t.name}</span> (${t.cnt})
            </label>
        </div>
    `).join('');
    new bootstrap.Modal(document.getElementById('batchTagModal')).show();
}

async function submitBatchTags() {
    const tagIds = Array.from(document.querySelectorAll('#tagCheckboxes input:checked')).map(i=>parseInt(i.value));
    const newTags = document.getElementById('newTagsInput').value.split(',').map(s=>s.trim()).filter(Boolean);
    await api('/api/questions/batch_tags', {
        method:'POST',
        body: {
            question_ids: Array.from(selectedIds),
            tag_ids: tagIds,
            new_tags: newTags
        }
    });
    bootstrap.Modal.getOrCreateInstance(document.getElementById('batchTagModal')).hide();
    toast('批量打标签成功','success');
    selectedIds.clear();
    loadList(currentPage);
}

async function delQ(id) {
    if (!confirm('确认删除？该题将进入回收站，30天后自动物理删除。')) return;
    await api(`/api/questions/${id}`, {method:'DELETE'});
    toast('已移入回收站','success');
    loadList(currentPage);
}

// 初始化
loadKpOptions();
loadTags();
loadList(1);
</script>
{% endblock %}
